<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acceso privado — Elías Torres</title>
<link rel="stylesheet" href="../styles.css">
<style>
.login-wrap{
  max-width:380px;
  margin:120px auto;
  padding:0 24px;
}
.login-wrap h1{
  font-family:var(--serif);
  font-weight:400;
  font-size:1.9rem;
  margin-bottom:8px;
}
.login-wrap p.sub{
  font-family:var(--mono);
  font-size:0.78rem;
  color:var(--stone);
  margin-bottom:32px;
}
.field{margin-bottom:18px;}
.field label{
  display:block;
  font-family:var(--mono);
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--stone);
  margin-bottom:6px;
}
.field input{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  background:var(--paper);
  font-family:var(--sans);
  font-size:0.95rem;
  color:var(--ink);
}
.field input:focus{outline:2px solid var(--clay); outline-offset:1px;}
.btn-primary{
  width:100%;
  padding:13px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  font-family:var(--mono);
  font-size:0.78rem;
  text-transform:uppercase;
  letter-spacing:0.06em;
  cursor:pointer;
  transition:background .2s ease;
}
.btn-primary:hover{background:var(--clay);}
.btn-primary:disabled{opacity:0.5; cursor:not-allowed;}
#error-msg{
  margin-top:16px;
  font-family:var(--mono);
  font-size:0.78rem;
  color:var(--clay);
  display:none;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a href="../index.html" class="brand">Elías Torres<sup>arq.</sup></a>
  </div>
</header>

<div class="login-wrap">
  <h1>Área privada</h1>
  <p class="sub">ACCESO PARA GESTIÓN DE PROYECTOS</p>

  <form id="login-form">
    <div class="field">
      <label for="email">Correo</label>
      <input type="email" id="email" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Entrar</button>
    <p id="error-msg"></p>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script>
// Si ya hay sesión activa, ir directo al panel
supabaseClient.auth.getSession().then(({ data }) => {
  if (data.session) location.href = 'panel.html';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    errorMsg.textContent = error.message === 'Invalid login credentials'
      ? 'Correo o contraseña incorrectos.'
      : error.message;
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  location.href = 'panel.html';
});
</script>
</body>
</html>
