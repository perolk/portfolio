<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto — Elías Torres, arquitecto</title>
<meta name="description" content="Contacta con Elías Torres para tu próximo proyecto de arquitectura en Madrid y Zaragoza.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a href="index.html" class="brand">Elías Torres<sup>arq.</sup></a>
    <nav class="mainnav" id="mainnav">
      <a href="index.html">Proyectos</a>
      <a href="cv.html">CV</a>
      <a href="contacto.html" class="active">Contacto</a>
    </nav>
    <button class="navtoggle" id="navtoggle" aria-label="Abrir menú">☰</button>
  </div>
</header>

<main>
  <section class="wrap contact-grid">

    <div>
      <h1><strong style="color:var(--clay);">Hablemos</strong> de tu próximo proyecto.</h1>

      <dl class="contact-list">
        <dt>Correo</dt>
        <dd><a href="mailto:hola@eliastorres.es">hola@eliastorres.es</a></dd>

        <dt>Teléfono</dt>
        <dd><a href="tel:+34600000000">+34 600 000 000</a></dd>

        <dt>Estudio</dt>
        <dd>
          C/ Condes de Aragón 36<br>
          50009 Zaragoza, España
        </dd>

        <dt>También en</dt>
        <dd>Madrid</dd>

        <dt>Redes</dt>
        <dd>
          <a href="https://www.linkedin.com/in/eliastorresgil"
             target="_blank" rel="noopener">LinkedIn →</a>
        </dd>
      </dl>
    </div>

    <div class="contact-map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2994.5!2d-0.9068!3d41.6488!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd5914d6dc3b4b5d%3A0x1!2sCalle+Condes+de+Arag%C3%B3n+36%2C+50009+Zaragoza!5e0!3m2!1ses!2ses!4v1"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Ubicación del estudio Elías Torres en Zaragoza">
      </iframe>
    </div>

  </section>
</main>

<footer>
  <div class="wrap">
    <span>© 2026 Elías Torres</span>
    <a href="mailto:hola@eliastorres.es">hola@eliastorres.es</a>
  </div>
</footer>

<script>
(function(){
  var btn = document.getElementById('navtoggle');
  var nav = document.getElementById('mainnav');
  if(!btn || !nav) return;
  var overlay = document.createElement('div');
  overlay.className = 'nav-overlay';
  document.body.appendChild(overlay);
  function openMenu(){ nav.classList.add('open'); overlay.classList.add('open'); btn.textContent='✕'; document.body.style.overflow='hidden'; }
  function closeMenu(){ nav.classList.remove('open'); overlay.classList.remove('open'); btn.textContent='☰'; document.body.style.overflow=''; }
  btn.addEventListener('click', function(){ nav.classList.contains('open') ? closeMenu() : openMenu(); });
  overlay.addEventListener('click', closeMenu);
  nav.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeMenu); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });
})();
</script>
</body>
</html>
