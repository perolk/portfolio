<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto — Elías Torres, arquitecto</title>
<meta name="description" content="">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elías Torres, arquitecto">
<meta property="og:title" content="Elías Torres, arquitecto">
<meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Elías Torres, arquitecto">

<meta name="twitter:image" content="">
<link rel="stylesheet" href="../styles.css">
<style>
/* Imágenes de contenido intercaladas */
.content-img{margin:36px 0;}
.content-img img{
  width:100%;
  display:block;
  cursor:zoom-in;
  object-fit:contain;
  object-position:left center;
  background:var(--paper-dim);
}
.content-img figcaption{
  font-family:var(--mono);font-size:0.72rem;color:var(--stone);
  margin-top:8px;letter-spacing:0.03em;
}

/* Galería grid */
.gallery-section{padding:40px 0 20px;border-top:1px solid var(--line);margin-top:10px;}
.gallery-section h2{
  font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--clay);margin-bottom:20px;
}
.gallery-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;width:50%;margin:0 auto;
}
.gallery-thumb{
  aspect-ratio:4/3;overflow:hidden;
  cursor:zoom-in;background:var(--paper-dim);
}
.gallery-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s ease;
}
.gallery-thumb:hover img{transform:scale(1.04);}
@media(max-width:900px){.gallery-grid{width:80%;}}
@media(max-width:600px){
  .gallery-grid{width:100%;grid-template-columns:repeat(2,1fr);}
}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;background:rgba(15,14,10,0.96);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.lightbox.open{opacity:1;pointer-events:auto;}
.lightbox img{
  max-width:95vw;max-height:92vh;
  object-fit:contain;
  display:block;
}
.lightbox figcaption{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:0.72rem;color:rgba(255,255,255,0.6);
  letter-spacing:0.04em;white-space:nowrap;
}
.lb-close{
  position:absolute;top:16px;right:20px;background:none;border:none;
  color:#fff;font-size:28px;cursor:pointer;opacity:0.6;line-height:1;
  padding:8px;touch-action:manipulation;
}
.lb-close:hover{opacity:1;}
.lb-prev,.lb-next{
  position:absolute;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#fff;font-size:40px;
  cursor:pointer;opacity:0.4;padding:0 20px;line-height:1;
  touch-action:manipulation;
}
.lb-prev:hover,.lb-next:hover{opacity:1;}
.lb-prev{left:0;}.lb-next{right:0;}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a href="../index.html" class="brand">Elías Torres<sup>arq.</sup></a>
    <nav class="mainnav" id="mainnav">
      <a href="../index.html">Proyectos</a>
      <a href="../cv.html">CV</a>
      <a href="../contacto.html">Contacto</a>
    </nav>
    <button class="navtoggle" id="navtoggle" aria-label="Abrir menú">☰</button>
  </div>
</header>

<main>
  <section class="wrap detail-hero">
    <a class="backlink" href="../index.html">← Índice de proyectos</a>
    <p class="plate" id="d-plate">Cargando…</p>
    <h1 id="d-title"></h1>
  </section>

  <figure class="detail-figure">
    <img id="d-img" src="" alt="">
  </figure>

  <section class="wrap detail-body">
    <dl class="spec-list" id="d-specs"></dl>
    <div class="body-copy" id="d-body"></div>
  </section>

  <section class="gallery-section wrap" id="gallery-section" style="display:none;">
    <h2>Imágenes del proyecto</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <nav class="wrap detail-nav">
    <a class="prev" id="d-prev" href="../index.html"></a>
    <a class="next" id="d-next" href="../index.html"></a>
  </nav>
</main>

<footer>
  <div class="wrap">
    <span>© 2026 Elías Torres</span>
    <a href="../contacto.html" class="cta-hablemos"><strong>Hablemos</strong> de tu proyecto →</a>
  </div>
</footer>

<!-- Lightbox -->
<figure class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Cerrar">✕</button>
  <button class="lb-prev"  id="lb-prev"  aria-label="Anterior">‹</button>
  <img id="lb-img" src="" alt="">
  <figcaption id="lb-caption"></figcaption>
  <button class="lb-next"  id="lb-next"  aria-label="Siguiente">›</button>
</figure>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../data-client.js"></script>
<script>
// --- Nav móvil ---
(function(){
  var btn = document.getElementById('navtoggle');
  var nav = document.getElementById('mainnav');
  if(!btn || !nav) return;
  var overlay = document.createElement('div');
  overlay.className = 'nav-overlay';
  document.body.appendChild(overlay);
  function openMenu(){ nav.classList.add('open'); overlay.classList.add('open'); btn.textContent='✕'; document.body.style.overflow='hidden'; }
  function closeMenu(){ nav.classList.remove('open'); overlay.classList.remove('open'); btn.textContent='☰'; document.body.style.overflow=''; }
  btn.addEventListener('click', function(){ nav.classList.contains('open') ? closeMenu() : openMenu(); });
  overlay.addEventListener('click', closeMenu);
  nav.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeMenu); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });
})();

const FIELD_LABELS = [
  ['lugar','Lugar'],['zona','Zona de actuación'],['edificio','Edificio'],
  ['arquitecto','Arquitecto'],['cliente','Cliente'],['programa','Programa'],
  ['software','Software'],['year','Año']
];

function getSlug(){
  const params = new URLSearchParams(location.search);
  if(params.get('p')) return params.get('p');
  const path = location.pathname.split('/').pop().replace('.html','');
  return path === 'detalle' ? null : path;
}

// --- Lightbox ---
let lbImages = [], lbIdx = 0;

function openLightbox(images, idx){
  lbImages = images;
  lbIdx = idx;
  showLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.addEventListener('keydown', lbKey);
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  document.removeEventListener('keydown', lbKey);
}
function showLb(){
  const item = lbImages[lbIdx];
  document.getElementById('lb-img').src = item.url;
  document.getElementById('lb-img').alt = item.caption || '';
  document.getElementById('lb-caption').textContent = item.caption || '';
}
function lbKey(e){
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); }
  if(e.key === 'ArrowRight'){ lbIdx = (lbIdx + 1) % lbImages.length; showLb(); }
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); });
document.getElementById('lb-next').addEventListener('click', () => { lbIdx = (lbIdx + 1) % lbImages.length; showLb(); });
document.getElementById('lightbox').addEventListener('click', e => { if(e.target === e.currentTarget) closeLightbox(); });

// --- Construir cuerpo con imágenes intercaladas ---
function buildBody(descripcion, contenidoImgs){
  const bodyEl = document.getElementById('d-body');
  bodyEl.innerHTML = '';

  let parrafos = descripcion.split(/\n[ \t]*\n/).map(p => p.trim()).filter(Boolean);
  if(parrafos.length <= 1){
    parrafos = descripcion.split('\n').map(p => p.trim()).filter(Boolean);
  }
  if(parrafos.length === 0) parrafos = [descripcion.trim()];

  const insertadas = new Set();

  parrafos.forEach((texto, i) => {
    const num = i + 1;
    const p = document.createElement('p');
    p.textContent = texto;
    bodyEl.appendChild(p);

    // Insertar imágenes de contenido en esta posición
    contenidoImgs.forEach((img, imgIdx) => {
      const pos = parseInt(img.posicion, 10);
      if(!isNaN(pos) && pos === num && !insertadas.has(imgIdx)){
        insertadas.add(imgIdx);
        bodyEl.appendChild(makeFig(img, contenidoImgs, imgIdx));
      }
    });
  });

  // Imágenes no insertadas → al final
  contenidoImgs.forEach((img, imgIdx) => {
    if(!insertadas.has(imgIdx)){
      bodyEl.appendChild(makeFig(img, contenidoImgs, imgIdx));
    }
  });
}

// Crear figura con lightbox al hacer clic
function makeFig(img, allImgs, selfIdx){
  const fig = document.createElement('figure');
  fig.className = 'content-img';

  const imgEl = document.createElement('img');
  imgEl.src     = img.url;
  imgEl.alt     = img.caption || '';
  imgEl.loading = 'lazy';
  imgEl.title   = 'Clic para ampliar';
  imgEl.addEventListener('click', () => openLightbox(allImgs, selfIdx));
  fig.appendChild(imgEl);

  if(img.caption){
    const cap = document.createElement('figcaption');
    cap.textContent = img.caption;
    fig.appendChild(cap);
  }
  return fig;
}

// --- Cargar imágenes extra ---
async function loadExtraImages(slug, descripcion){
  const { data, error } = await supabaseClient
    .from('proyecto_imagenes').select('*')
    .eq('proyecto_slug', slug).order('orden', { ascending: true });

  const imgs     = (!error && data) ? data : [];
  const contenido = imgs.filter(x => x.tipo === 'contenido');
  const galeria   = imgs.filter(x => x.tipo === 'galeria');

  buildBody(descripcion, contenido);

  if(galeria.length > 0){
    document.getElementById('gallery-section').style.display = '';
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = galeria.map((img, idx) =>
      `<div class="gallery-thumb" data-idx="${idx}" role="button" tabindex="0">
        <img src="${img.url}" alt="${img.caption||''}" loading="lazy">
      </div>`).join('');
    grid.querySelectorAll('.gallery-thumb').forEach(el => {
      el.addEventListener('click', () => openLightbox(galeria, parseInt(el.dataset.idx)));
      el.addEventListener('keydown', e => { if(e.key==='Enter') openLightbox(galeria, parseInt(el.dataset.idx)); });
    });
  }
}

// --- Init ---
async function init(){
  const slug = getSlug();
  if(!slug){ document.getElementById('d-plate').textContent = 'Proyecto no especificado.'; return; }

  let proyectos;
  try{ proyectos = await fetchProyectos(); }
  catch(err){ document.getElementById('d-plate').textContent = 'Error al cargar.'; return; }

  const i = proyectos.findIndex(p => p.id === slug);
  if(i === -1){ document.getElementById('d-plate').textContent = 'Proyecto no encontrado.'; return; }

  const p = proyectos[i], total = proyectos.length;
  const prev = proyectos[(i-1+total)%total];
  const next = proyectos[(i+1)%total];

  document.title = `${p.title} — Elías Torres, arquitecto`;

  // Open Graph dinámico
  const desc = p.descripcion ? p.descripcion.slice(0,160) : '';
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if(el) el.setAttribute('content', val); };
  setMeta('meta[name="description"]',         desc);
  setMeta('meta[property="og:title"]',        `${p.title} — Elías Torres, arquitecto`);
  setMeta('meta[property="og:description"]',  desc);
  setMeta('meta[property="og:image"]',        p.img);
  setMeta('meta[property="og:url"]',          location.href);
  setMeta('meta[name="twitter:title"]',       `${p.title} — Elías Torres, arquitecto`);
  setMeta('meta[name="twitter:description"]', desc);
  setMeta('meta[name="twitter:image"]',       p.img);

  document.getElementById('d-plate').textContent = `Lámina ${p.num} / ${total}${p.year?' · '+p.year:''}`;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-img').src = p.img;
  document.getElementById('d-img').alt = p.title;

  const specs = FIELD_LABELS.filter(([k])=>p[k]).map(([k,l])=>`<dt>${l}</dt><dd>${p[k]}</dd>`).join('');
  document.getElementById('d-specs').innerHTML = specs
    + `<dt>Categorías</dt><dd class="tags">${p.tags.map(t=>`<a href="../index.html">${t}</a>`).join('')}</dd>`;

  document.getElementById('d-prev').href = `detalle.html?p=${prev.id}`;
  document.getElementById('d-prev').textContent = `← ${prev.title}`;
  document.getElementById('d-next').href = `detalle.html?p=${next.id}`;
  document.getElementById('d-next').textContent = `${next.title} →`;

  await loadExtraImages(slug, p.descripcion);
}

init();
</script>
</body>
</html>
