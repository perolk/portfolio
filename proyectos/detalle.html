<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto — Elías Torres, arquitecto</title>
<link rel="stylesheet" href="../styles.css">
<style>
/* ---- Imágenes de contenido intercaladas ---- */
.content-img{margin:32px 0;}
.content-img img{width:100%;max-height:65vh;object-fit:cover;display:block;}
.content-img figcaption{
  font-family:var(--mono);font-size:0.72rem;color:var(--stone);
  margin-top:8px;letter-spacing:0.03em;
}

/* ---- Galería grid — 50% de ancho, centrada ---- */
.gallery-section{
  padding:40px 0 20px;
  border-top:1px solid var(--line);
  margin-top:10px;
}
.gallery-section h2{
  font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--clay);margin-bottom:20px;
}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3px;
  width:50%;
  margin:0 auto;
}
.gallery-thumb{
  aspect-ratio:4/3;overflow:hidden;
  cursor:zoom-in;background:var(--paper-dim);
}
.gallery-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s ease;
}
.gallery-thumb:hover img{transform:scale(1.04);}
@media(max-width:900px){
  .gallery-grid{width:80%;}
}
@media(max-width:600px){
  .gallery-grid{width:100%;grid-template-columns:repeat(2,1fr);}
}

/* ---- Lightbox ---- */
.lightbox{
  position:fixed;inset:0;background:rgba(15,14,10,0.94);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.lightbox.open{opacity:1;pointer-events:auto;}
.lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.lightbox figcaption{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:0.72rem;color:rgba(255,255,255,0.6);
  letter-spacing:0.04em;white-space:nowrap;
}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:0.6;line-height:1;}
.lb-close:hover{opacity:1;}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:36px;cursor:pointer;opacity:0.5;padding:0 16px;line-height:1;}
.lb-prev:hover,.lb-next:hover{opacity:1;}
.lb-prev{left:0;}.lb-next{right:0;}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a href="../index.html" class="brand">Elías Torres<sup>arq.</sup></a>
    <nav class="mainnav" id="mainnav">
      <a href="../index.html">Proyectos</a>
      <a href="../cv.html">CV</a>
      <a href="../contacto.html">Contacto</a>
    </nav>
    <button class="navtoggle" id="navtoggle" aria-label="Abrir menú">☰</button>
  </div>
</header>

<main>
  <section class="wrap detail-hero">
    <a class="backlink" href="../index.html">← Índice de proyectos</a>
    <p class="plate" id="d-plate">Cargando…</p>
    <h1 id="d-title"></h1>
  </section>

  <figure class="detail-figure">
    <img id="d-img" src="" alt="">
  </figure>

  <section class="wrap detail-body">
    <dl class="spec-list" id="d-specs"></dl>
    <div class="body-copy" id="d-body">
      <!-- párrafos + imágenes de contenido se insertan aquí -->
    </div>
  </section>

  <!-- Galería grid al 50% centrada -->
  <section class="gallery-section wrap" id="gallery-section" style="display:none;">
    <h2>Imágenes del proyecto</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <nav class="wrap detail-nav">
    <a class="prev" id="d-prev" href="../index.html"></a>
    <a class="next" id="d-next" href="../index.html"></a>
  </nav>
</main>

<footer>
  <div class="wrap">
    <span>© 2026 Elías Torres</span>
    <a href="../contacto.html">Hablemos de tu proyecto →</a>
  </div>
</footer>

<!-- Lightbox -->
<figure class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Cerrar">✕</button>
  <button class="lb-prev"  id="lb-prev"  aria-label="Anterior">‹</button>
  <img id="lb-img" src="" alt="">
  <figcaption id="lb-caption"></figcaption>
  <button class="lb-next"  id="lb-next"  aria-label="Siguiente">›</button>
</figure>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../data-client.js"></script>
<script>
// --- Nav móvil ---
(function(){
  var btn = document.getElementById('navtoggle');
  var nav = document.getElementById('mainnav');
  if(btn && nav){
    btn.addEventListener('click', function(){
      nav.classList.toggle('open');
      btn.textContent = nav.classList.contains('open') ? '✕' : '☰';
    });
  }
})();

const FIELD_LABELS = [
  ['lugar','Lugar'],['zona','Zona de actuación'],['edificio','Edificio'],
  ['arquitecto','Arquitecto'],['cliente','Cliente'],['programa','Programa'],
  ['software','Software'],['year','Año']
];

function getSlug(){
  const params = new URLSearchParams(location.search);
  if(params.get('p')) return params.get('p');
  const path = location.pathname.split('/').pop().replace('.html','');
  return path === 'detalle' ? null : path;
}

// --- Lightbox ---
let lbImages = [], lbIdx = 0;
function openLightbox(images, idx){
  lbImages = images; lbIdx = idx; showLb();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKey);
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}
function showLb(){
  const item = lbImages[lbIdx];
  document.getElementById('lb-img').src = item.url;
  document.getElementById('lb-caption').textContent = item.caption || '';
}
function lbKey(e){
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); }
  if(e.key === 'ArrowRight'){ lbIdx = (lbIdx + 1) % lbImages.length; showLb(); }
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); });
document.getElementById('lb-next').addEventListener('click', () => { lbIdx = (lbIdx + 1) % lbImages.length; showLb(); });
document.getElementById('lightbox').addEventListener('click', e => { if(e.target === e.currentTarget) closeLightbox(); });

// --- Construir cuerpo: párrafos + imágenes de contenido intercaladas ---
function buildBody(descripcion, contenidoImgs){
  const bodyEl = document.getElementById('d-body');
  bodyEl.innerHTML = '';

  // Dividir la descripción en párrafos por doble salto de línea
  const parrafos = descripcion
    .split(/\n\s*\n/)
    .map(p => p.trim())
    .filter(Boolean);

  // Si no hay doble salto, tratar cada línea como párrafo
  const bloques = parrafos.length > 1
    ? parrafos
    : descripcion.split('\n').map(p => p.trim()).filter(Boolean);

  bloques.forEach((texto, i) => {
    const num = i + 1; // párrafos cuentan desde 1

    // Insertar párrafo
    const p = document.createElement('p');
    p.textContent = texto;
    bodyEl.appendChild(p);

    // Insertar imágenes de contenido que van tras este párrafo
    const aqui = contenidoImgs.filter(img => img.posicion === num);
    aqui.forEach(img => {
      const fig = document.createElement('figure');
      fig.className = 'content-img';
      fig.innerHTML = `<img src="${img.url}" alt="${img.caption || ''}" loading="lazy">`
        + (img.caption ? `<figcaption>${img.caption}</figcaption>` : '');
      bodyEl.appendChild(fig);
    });
  });

  // Imágenes de contenido sin posición asignada o con posición > nº párrafos: al final
  const sinPosicion = contenidoImgs.filter(img =>
    !img.posicion || img.posicion > bloques.length
  );
  sinPosicion.forEach(img => {
    const fig = document.createElement('figure');
    fig.className = 'content-img';
    fig.innerHTML = `<img src="${img.url}" alt="${img.caption || ''}" loading="lazy">`
      + (img.caption ? `<figcaption>${img.caption}</figcaption>` : '');
    bodyEl.appendChild(fig);
  });
}

// --- Cargar e inyectar imágenes extra ---
async function loadExtraImages(slug, descripcion){
  const { data, error } = await supabaseClient
    .from('proyecto_imagenes')
    .select('*')
    .eq('proyecto_slug', slug)
    .order('orden', { ascending: true });

  const imgs = (!error && data) ? data : [];
  const contenido = imgs.filter(x => x.tipo === 'contenido');
  const galeria   = imgs.filter(x => x.tipo === 'galeria');

  // Construir cuerpo del texto con imágenes de contenido intercaladas
  buildBody(descripcion, contenido);

  // Grid de galería
  if(galeria.length > 0){
    const section = document.getElementById('gallery-section');
    const grid    = document.getElementById('gallery-grid');
    section.style.display = '';
    grid.innerHTML = galeria.map((img, idx) => `
      <div class="gallery-thumb" data-idx="${idx}"
           role="button" tabindex="0" aria-label="Ver imagen ${idx+1}">
        <img src="${img.url}" alt="${img.caption || ''}" loading="lazy">
      </div>`).join('');
    grid.querySelectorAll('.gallery-thumb').forEach(el => {
      el.addEventListener('click', () => openLightbox(galeria, parseInt(el.dataset.idx)));
      el.addEventListener('keydown', e => {
        if(e.key === 'Enter') openLightbox(galeria, parseInt(el.dataset.idx));
      });
    });
  } else {
    // Si no hay galería, construir el cuerpo igualmente
    if(contenido.length === 0) buildBody(descripcion, []);
  }
}

// --- Inicializar página ---
async function init(){
  const slug = getSlug();
  if(!slug){ document.getElementById('d-plate').textContent = 'Proyecto no especificado.'; return; }

  let proyectos;
  try{ proyectos = await fetchProyectos(); }
  catch(err){ document.getElementById('d-plate').textContent = 'Error al cargar.'; return; }

  const i = proyectos.findIndex(p => p.id === slug);
  if(i === -1){ document.getElementById('d-plate').textContent = 'Proyecto no encontrado.'; return; }

  const p     = proyectos[i];
  const total = proyectos.length;
  const prev  = proyectos[(i - 1 + total) % total];
  const next  = proyectos[(i + 1) % total];

  document.title = `${p.title} — Elías Torres, arquitecto`;
  document.getElementById('d-plate').textContent =
    `Lámina ${p.num} / ${total}${p.year ? ' · ' + p.year : ''}`;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-img').src = p.img;
  document.getElementById('d-img').alt = p.title;

  const specs = FIELD_LABELS
    .filter(([key]) => p[key])
    .map(([key,label]) => `<dt>${label}</dt><dd>${p[key]}</dd>`)
    .join('');
  document.getElementById('d-specs').innerHTML = specs
    + `<dt>Categorías</dt><dd class="tags">${p.tags.map(t=>`<a href="../index.html">${t}</a>`).join('')}</dd>`;

  document.getElementById('d-prev').href = `detalle.html?p=${prev.id}`;
  document.getElementById('d-prev').textContent = `← ${prev.title}`;
  document.getElementById('d-next').href = `detalle.html?p=${next.id}`;
  document.getElementById('d-next').textContent = `${next.title} →`;

  await loadExtraImages(slug, p.descripcion);
}

init();
</script>
</body>
</html>
